version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:16-pgvector
    container_name: tashgheel-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: tashgheel_user
      POSTGRES_PASSWORD: tashgheel_password
      POSTGRES_DB: tashgheel_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tashgheel_user -d tashgheel_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tashgheel-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
