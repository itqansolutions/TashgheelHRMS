version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:16-pgvector
    container_name: tashgheel-postgres-prod
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: tashgheel_user
      POSTGRES_PASSWORD: tashgheel_password_prod
      POSTGRES_DB: tashgheel_db_prod
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tashgheel_user -d tashgheel_db_prod"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tashgheel-redis-prod
    ports:
      - "6379:6379"
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: tashgheel-api-prod
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://tashgheel_user:tashgheel_password_prod@postgres:5432/tashgheel_db_prod?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PORT: 4000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: tashgheel-web-prod
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
    depends_on:
      - api

volumes:
  postgres_prod_data:
    driver: local
  redis_prod_data:
    driver: local
