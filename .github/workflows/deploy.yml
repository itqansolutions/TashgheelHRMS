name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy Services
        run: |
          echo "Deploying applications to Railway Cloud..."
          # Railway automatically connects to the repository and deploys services defined in the dashboard.
          # This workflow serves as an alternative pipeline if triggering via CLI with token:
          # railway up --service api --detach
          # railway up --service web --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
